name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy Vite frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/asia-global-textiles' }}
      RELEASE_DIR: /tmp/asia-global-textiles-${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p "$EC2_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload build to EC2
        run: |
          ssh -i ~/.ssh/deploy_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" "rm -rf '$RELEASE_DIR' && mkdir -p '$RELEASE_DIR'"
          scp -i ~/.ssh/deploy_key -P "$EC2_PORT" -r dist/* "$EC2_USER@$EC2_HOST:$RELEASE_DIR/"

      - name: Publish release
        run: |
          ssh -i ~/.ssh/deploy_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" "
            sudo mkdir -p '$DEPLOY_PATH' &&
            sudo rm -rf '$DEPLOY_PATH'/* &&
            sudo cp -r '$RELEASE_DIR'/* '$DEPLOY_PATH' &&
            sudo chown -R www-data:www-data '$DEPLOY_PATH' &&
            rm -rf '$RELEASE_DIR'
          "
